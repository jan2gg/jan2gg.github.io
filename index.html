<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#ffffff" />
  <title>Jan García i Girona</title>
  <style>
    :root { --bg:#ffffff; --text:#111111; --muted:#5b5b5b; --card:#f6f6f6; --border:#e5e5e5; --btn:#111111; --btnText:#ffffff; }
    * { box-sizing:border-box; }
    body { margin:0; font-family: Arial, Helvetica, sans-serif; background:var(--bg); color:var(--text); }
    .wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { width:100%; max-width:420px; background:var(--card); border:1px solid var(--border); border-radius:24px; padding:28px; text-align:center; }
    h1 { margin:0 0 8px; font-size:32px; line-height:1.1; }
    .sub { margin:0 0 22px; color:var(--muted); font-size:16px; }
    .btn { display:block; width:100%; padding:16px 18px; margin:12px 0; border-radius:16px; text-decoration:none; font-weight:700; font-size:16px; }
    .primary { background:var(--btn); color:var(--btnText); }
    .secondary { background:#fff; color:var(--text); border:1px solid var(--border); }
    .small { margin-top:18px; color:var(--muted); font-size:13px; }
    .tiny { margin-top:10px; color:var(--muted); font-size:12px; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Jan García i Girona</h1>
      <p class="sub">Connect with me here</p>
      <a class="btn primary" href="https://www.linkedin.com/in/jan-garc%C3%ADa-i-girona/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <a class="btn secondary" href="https://www.instagram.com/jan.abcd1234/" target="_blank" rel="noopener noreferrer">Instagram</a>
      <div class="small">ICN2 farewell card</div>
      <div class="tiny">You just scanned my contact card, feel free to follow me on ig or connect through linkedin :)</div>
    </section>
  </main>
</body>
</html>
